<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#8f2d22">
  <link rel="manifest" href="manifest.json">
  <title>廟埕守香</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=mobile-16">


</head>
<body>
  <div id="title-screen" class="title-screen">
    <div class="title-content">
      <p class="eyebrow">台灣神明文字塔防</p>
      <h1>廟埕守香</h1>
      <button id="start-game-btn" type="button" class="start-btn">入廟鎮守</button>
    </div>
    <div class="title-footer">
      <p>v1.0.0 &copy; 2026 廟埕守香 Incense Ashes. All Rights Reserved.</p>
    </div>
  </div>

  <main id="game-shell" style="display: none;">
    <header class="top-panel">
      <div class="brand-lockup">
        <p class="eyebrow">台灣神明文字塔防</p>
        <h1>廟埕守香</h1>
      </div>

      <section class="status-bar" aria-label="戰況">
        <div class="stat">
          <span>香爐</span>
          <strong id="base-hp">10/10</strong>
        </div>
        <div class="stat">
          <span>波次</span>
          <strong id="wave">1</strong>
        </div>
        <div class="stat">
          <span>香火</span>
          <strong id="grain">80</strong>
        </div>
        <div class="stat">
          <span>降伏</span>
          <strong id="kills">0</strong>
        </div>
        <div class="stat">
          <span>餘敵</span>
          <strong id="remaining">-</strong>
        </div>
      </section>

      <div class="header-actions">
        <button id="speed-btn" type="button" aria-label="戰鬥速度 1 倍" aria-pressed="false" title="戰鬥速度">1×</button>
        <button id="hub-btn" type="button" aria-label="開啟活動中心" aria-expanded="false" title="活動中心">
          <span aria-hidden="true">祭</span>
        </button>
        <button id="audio-btn" type="button" aria-label="關閉音樂音效" aria-pressed="true" title="關閉音樂音效">
          <span aria-hidden="true">♫</span>
        </button>
        <button id="restart-btn" type="button">重開</button>
      </div>
    </header>

    <section class="play-area" aria-label="守香戰場">
      <section class="battlefield" aria-label="廟埕">
        <div id="board"></div>
        <div id="enemy-layer" aria-hidden="true"></div>
        <div id="fx-layer" aria-hidden="true"></div>
      </section>

      <section class="command-panel" aria-label="法壇">
        <div class="bench-header">
          <div id="unit-inspector" class="unit-inspector" aria-live="polite">
            <span class="unit-inspector-copy">
              <strong id="unit-inspector-name">法壇</strong>
              <small id="unit-inspector-level">待命</small>
            </span>
            <span class="unit-attack-stat">
              <small>攻</small>
              <b id="unit-inspector-attack">-</b>
            </span>
          </div>
          <div class="altar-actions">
            <button id="pace-btn" type="button">迎第 1 波</button>
            <button id="discard-zone" type="button" aria-label="化去" title="化去"><span>化去</span></button>
            <button id="summon-btn" type="button">請令 <small id="summon-cost">18</small></button>
          </div>
        </div>
        <div id="bench"></div>
      </section>

      <div class="battle-log-strip">
        <strong>戰報</strong>
        <p id="battle-log">廟埕安靜，壇前待請。</p>
      </div>
    </section>

    <nav class="game-nav" aria-label="遊戲功能">
      <button class="nav-item active" type="button" data-nav="battle">
        <span class="nav-icon" aria-hidden="true"><img src="assets/nav-battle.png" alt=""></span>
        <strong>守香</strong>
      </button>
      <button class="nav-item" type="button" data-hub-tab="checkin">
        <span class="nav-icon" aria-hidden="true"><img src="assets/nav-checkin.png" alt=""></span>
        <strong>簽到</strong>
        <i class="nav-dot" data-alert="checkin"></i>
      </button>
      <button class="nav-item" type="button" data-hub-tab="tasks">
        <span class="nav-icon" aria-hidden="true"><img src="assets/nav-tasks.png" alt=""></span>
        <strong>任務</strong>
        <i class="nav-dot" data-alert="tasks"></i>
      </button>
      <button class="nav-item" type="button" data-hub-tab="events">
        <span class="nav-icon" aria-hidden="true"><img src="assets/nav-events.png" alt=""></span>
        <strong>活動</strong>
        <i class="nav-dot" data-alert="events"></i>
      </button>
      <button class="nav-item" type="button" data-hub-tab="codex">
        <span class="nav-icon" aria-hidden="true"><img src="assets/nav-codex.png" alt=""></span>
        <strong>神明譜</strong>
      </button>
    </nav>

    <aside id="activity-panel" class="activity-panel" aria-label="活動中心">
      <div class="hub-header">
        <img id="hub-section-icon" class="hub-section-icon" src="assets/nav-events.png" alt="">
        <div>
          <span>廟會簿</span>
          <h2 id="hub-title">每日活動</h2>
        </div>
      </div>
      <div id="hub-content" class="hub-content" aria-live="polite"></div>
    </aside>
  </main>

  <div id="choice-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="choice-title">
    <div class="modal-card">
      <p class="eyebrow">籤詩</p>
      <h2 id="choice-title">擇一加持</h2>
      <div id="choice-list" class="choice-list"></div>
    </div>
  </div>

  <div id="image-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="大圖預覽">
    <div class="image-modal-card">
      <button id="image-modal-close" class="modal-close-btn" type="button" aria-label="關閉">×</button>
      <img id="image-modal-img" src="" alt="大圖預覽">
    </div>
  </div>

  <div id="result-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="result-title">
    <div class="modal-card result-card">
      <p class="eyebrow" id="result-kicker">廟報</p>
      <h2 id="result-title">香火未斷</h2>
      <p id="result-copy"></p>
      <button id="result-btn" type="button">再來一局</button>
    </div>
  </div>

    <script src="js/config.js?v=mobile-13"></script>
    <script src="js/state.js?v=mobile-13"></script>
    <script src="js/audio.js?v=mobile-13"></script>
    <script src="js/activities.js?v=mobile-13"></script>
    <script src="js/render.js?v=mobile-13"></script>
    <script src="js/input.js?v=mobile-13"></script>
    <script src="js/flow.js?v=mobile-13"></script>
    <script src="js/effects.js?v=mobile-13"></script>
    <script src="js/app.js?v=mobile-13"></script>
</body>
</html>
